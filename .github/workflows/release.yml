name: Release
run-name: ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Build Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist-electron/*.exe
            dist-electron/latest.yml
            dist-electron/*.blockmap
          retention-days: 1

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install system dependencies
        run: sudo apt-get update -y && sudo apt-get install -y rpm libarchive-tools xdotool wtype wl-clipboard xclip speech-dispatcher espeak-ng libnotify4 libnss3 libxss1 libsecret-1-0 libsecret-1-dev
      - run: npm install
      - name: Build Linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/latest*.yml
            dist-electron/*.blockmap
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: release-assets/
      - uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: release-assets/
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-website:
    name: Deploy Website · Firebase
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BLOOM_DIAL }}
          channelId: live
          projectId: bloom-dial

