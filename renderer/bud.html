<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Bloom Bud</title>
  <link rel="stylesheet" href="bloom.css">
  <style>
    /* the bud fills this tiny always-interactive window */
    html, body { background: transparent; overflow: hidden; }
    body { width: 100vw; height: 100vh; }
    #bud {
      position: absolute; left: 50%; top: 50%;
      margin: 0; transform: translate(-50%, -50%);
      width: var(--bud); height: var(--bud);
    }
    /* Ring open: overlay owns the bud pixels, so blank the real bud via class.
       Opacity must change instantly — transitions stall while occluded behind the overlay. */
    #bud { transition: transform 0.28s cubic-bezier(0.3, 1.3, 0.5, 1); }
    body.conceal #bud { opacity: 0; }
  </style>
</head>
<body>
  <div id="bud">
    <div class="bud-body">
      <div class="bud-aurora"></div>
      <div class="bud-glass"></div>
      <div class="bud-spec"></div>
      <div class="bud-core"></div>
    </div>
    <div class="pulse"></div>
    <div class="voice-fx"></div>
  </div>
  <script src="bud.js"></script>
</body>
</html>
