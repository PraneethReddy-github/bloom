<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Welcome to Bloom</title>
  <link rel="stylesheet" href="onboard.css">
</head>
<body>
  <div id="drag"></div>
  <main id="card">
    <div class="ob-viewport">
      <section class="ob-slide" id="slide">
        <div class="ob-art" id="art"></div>
        <h1 id="ob-h"></h1>
        <p id="ob-p"></p>
      </section>
    </div>

    <footer class="ob-foot">
      <button class="ob-btn ghost" id="ob-skip">Skip</button>
      <div class="ob-dots" id="dots"></div>
      <button class="ob-btn primary" id="ob-next">Next</button>
    </footer>
  </main>

  <script src="icons.js"></script>
  <script src="onboard.js"></script>
</body>
</html>
